name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: 'Features'
    labels:
      - 'type: feature'
      - 'type: enhancement'
  - title: 'Bug Fixes'
    labels:
      - 'type: bug'
      - 'type: bugfix'
  - title: 'Documentation'
    labels:
      - 'type: docs'
      - 'type: documentation'
  - title: 'Performance'
    labels:
      - 'type: performance'
      - 'type: perf'
  - title: 'Maintenance'
    labels:
      - 'type: chore'
      - 'type: refactor'
      - 'type: internal'
change-template: '- $TITLE (@$AUTHOR) (#$NUMBER)'
change-title-escapes: '\<*_&'
version-resolver:
  major:
    labels:
      - 'semver: major'
  minor:
    labels:
      - 'semver: minor'
  patch:
    labels:
      - 'semver: patch'
  default: patch
template: |
  ## What's Changed

  $CHANGES

  ## Contributors

  $CONTRIBUTORS
