<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box { fill: #F8F9FA; stroke: #2C3E50; stroke-width: 2; }
      .box-title { font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #2C3E50; }
      .box-text { font-family: 'Courier New', monospace; font-size: 12px; fill: #555; }
      .arrow { stroke: #34495E; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .layer-label { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2C3E50; }
      .layer-divider { stroke: #BDC3C7; stroke-width: 1; stroke-dasharray: 5,5; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#34495E" />
    </marker>
  </defs>

  <!-- Background layers -->
  <rect x="50" y="20" width="900" height="100" fill="#E8F4F8" opacity="0.3" rx="5"/>
  <rect x="50" y="140" width="900" height="180" fill="#FFF5E6" opacity="0.3" rx="5"/>
  <rect x="50" y="340" width="900" height="150" fill="#F0F0F0" opacity="0.3" rx="5"/>
  <rect x="50" y="510" width="900" height="170" fill="#E8F5E9" opacity="0.3" rx="5"/>

  <!-- Layer labels -->
  <text x="70" y="45" class="layer-label">User Application</text>
  <text x="70" y="165" class="layer-label">Cognate Framework</text>
  <text x="70" y="365" class="layer-label">Provider Implementations</text>
  <text x="70" y="535" class="layer-label">External Services</text>

  <!-- Layer 1: User Application -->
  <rect x="100" y="60" width="140" height="60" class="box" rx="3"/>
  <text x="115" y="80" class="box-title">Application</text>
  <text x="115" y="100" class="box-text">Your LLM app</text>

  <rect x="300" y="60" width="140" height="60" class="box" rx="3"/>
  <text x="315" y="80" class="box-title">Tools/Agents</text>
  <text x="315" y="100" class="box-text">Tool executor</text>

  <rect x="500" y="60" width="140" height="60" class="box" rx="3"/>
  <text x="515" y="80" class="box-title">RAG Pipeline</text>
  <text x="515" y="100" class="box-text">Memory, search</text>

  <rect x="700" y="60" width="140" height="60" class="box" rx="3"/>
  <text x="715" y="80" class="box-title">Axum Server</text>
  <text x="715" y="100" class="box-text">Web handlers</text>

  <!-- Layer 2: Cognate Framework -->
  <rect x="100" y="170" width="800" height="35" class="box" rx="3"/>
  <text x="115" y="195" class="box-title">cognate-core: Provider trait, Request/Response, Middleware system</text>

  <rect x="100" y="230" width="190" height="80" class="box" rx="3"/>
  <text x="115" y="250" class="box-title">cognate-tools</text>
  <text x="115" y="268" class="box-text">Tool dispatch</text>
  <text x="115" y="283" class="box-text">Execution loop</text>
  <text x="115" y="298" class="box-text">#[derive(Tool)]</text>

  <rect x="320" y="230" width="190" height="80" class="box" rx="3"/>
  <text x="335" y="250" class="box-title">cognate-prompts</text>
  <text x="335" y="268" class="box-text">Compile-time</text>
  <text x="335" y="283" class="box-text">validation</text>
  <text x="335" y="298" class="box-text">#[derive(Prompt)]</text>

  <rect x="540" y="230" width="190" height="80" class="box" rx="3"/>
  <text x="555" y="250" class="box-title">cognate-rag</text>
  <text x="555" y="268" class="box-text">Vector search</text>
  <text x="555" y="283" class="box-text">Memory traits</text>
  <text x="555" y="298" class="box-text">Chunk management</text>

  <rect x="760" y="230" width="140" height="80" class="box" rx="3"/>
  <text x="775" y="250" class="box-title">cognate-axum</text>
  <text x="775" y="268" class="box-text">Extractors</text>
  <text x="775" y="283" class="box-text">Middleware</text>
  <text x="775" y="298" class="box-text">Layers</text>

  <!-- Arrows from apps to framework -->
  <path class="arrow" d="M 170 120 L 170 170"/>
  <path class="arrow" d="M 370 120 L 370 170"/>
  <path class="arrow" d="M 570 120 L 570 170"/>
  <path class="arrow" d="M 770 120 L 770 170"/>

  <!-- Arrows from framework to implementation -->
  <path class="arrow" d="M 195 310 L 195 350"/>
  <path class="arrow" d="M 415 310 L 415 350"/>
  <path class="arrow" d="M 635 310 L 635 350"/>
  <path class="arrow" d="M 830 310 L 830 350"/>

  <!-- Layer 3: Provider Implementations -->
  <rect x="100" y="370" width="170" height="80" class="box" rx="3"/>
  <text x="115" y="390" class="box-title">OpenAI Provider</text>
  <text x="115" y="408" class="box-text">Chat completion</text>
  <text x="115" y="423" class="box-text">Streaming</text>
  <text x="115" y="438" class="box-text">Tool calling</text>

  <rect x="310" y="370" width="170" height="80" class="box" rx="3"/>
  <text x="325" y="390" class="box-title">Anthropic Provider</text>
  <text x="325" y="408" class="box-text">Chat completion</text>
  <text x="325" y="423" class="box-text">Streaming</text>
  <text x="325" y="438" class="box-text">Tool use</text>

  <rect x="520" y="370" width="170" height="80" class="box" rx="3"/>
  <text x="535" y="390" class="box-title">Retry/Fallback</text>
  <text x="535" y="408" class="box-text">Exponential backoff</text>
  <text x="535" y="423" class="box-text">Provider fallback</text>
  <text x="535" y="438" class="box-text">Rate limiting</text>

  <rect x="730" y="370" width="170" height="80" class="box" rx="3"/>
  <text x="745" y="390" class="box-title">Custom Provider</text>
  <text x="745" y="408" class="box-text">Implement</text>
  <text x="745" y="423" class="box-text">Provider trait</text>
  <text x="745" y="438" class="box-text">Your service</text>

  <!-- Layer 4: External Services -->
  <rect x="100" y="540" width="170" height="120" class="box" rx="3"/>
  <text x="115" y="560" class="box-title">LLM APIs</text>
  <text x="115" y="578" class="box-text">OpenAI GPT-4</text>
  <text x="115" y="593" class="box-text">Anthropic Claude</text>
  <text x="115" y="608" class="box-text">Groq</text>
  <text x="115" y="623" class="box-text">Ollama</text>

  <rect x="310" y="540" width="170" height="120" class="box" rx="3"/>
  <text x="325" y="560" class="box-title">Vector DBs</text>
  <text x="325" y="578" class="box-text">Qdrant</text>
  <text x="325" y="593" class="box-text">Pinecone</text>
  <text x="325" y="608" class="box-text">Weaviate</text>
  <text x="325" y="623" class="box-text">In-memory</text>

  <rect x="520" y="540" width="170" height="120" class="box" rx="3"/>
  <text x="535" y="560" class="box-title">Observability</text>
  <text x="535" y="578" class="box-text">Tracing (OpenTel)</text>
  <text x="535" y="593" class="box-text">Metrics</text>
  <text x="535" y="608" class="box-text">Logging</text>
  <text x="535" y="623" class="box-text">Custom middleware</text>

  <rect x="730" y="540" width="170" height="120" class="box" rx="3"/>
  <text x="745" y="560" class="box-title">HTTP Service</text>
  <text x="745" y="578" class="box-text">Knowledge base</text>
  <text x="745" y="593" class="box-text">File storage</text>
  <text x="745" y="608" class="box-text">Search engines</text>
  <text x="745" y="623" class="box-text">Custom tools</text>

  <!-- Arrows from providers to external -->
  <path class="arrow" d="M 185 450 L 185 540"/>
  <path class="arrow" d="M 395 450 L 395 540"/>
  <path class="arrow" d="M 605 450 L 605 540"/>
  <path class="arrow" d="M 815 450 L 815 540"/>
</svg>
